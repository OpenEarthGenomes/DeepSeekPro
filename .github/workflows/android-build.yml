# .github/workflows/android-build.yml
name: 🚀 DeepSeek Pro - Automatikus APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🔑 Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "android.useAndroidX=true" >> local.properties
        echo "android.enableJetifier=true" >> local.properties

    - name: 🚀 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔨 Build Debug APK
      run: ./gradlew assembleDebug

    - name: 🔨 Build Release APK (unsigned)
      run: ./gradlew assembleRelease

    - name: 📦 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekPro-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: 📦 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekPro-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: 📊 Generate Build Info
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|" >> $GITHUB_STEP_SUMMARY
        for apk in app/build/outputs/apk/debug/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done
        for apk in app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: DeepSeekPro-Debug-APK
        path: debug-apk/

    - name: 📥 Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: DeepSeekPro-Release-APK
        path: release-apk/

    - name: 🏷️ Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "DeepSeek Pro v1.0.${{ github.run_number }}"
        body: |
          ## 🚀 DeepSeek Pro APK
          
          ### 📱 Samsung A35 + Android 16 (One UI 8.5) optimalizálva!
          
          ### ✨ Funkciók
          - 💬 DeepSeek chat (WebView)
          - 🧠 DeepThink (R1) kapcsoló
          - 📁 Automatikus mentés
          - 🔍 Két szintű keresés
          - 📋 Jegyzettömb
          - ⚡ Gyors lapozás (csúszka)
          - 📎 Fájlfeltöltés
          - 🌐 Magyar nyelv
          - 🌙 Éjszakai mód (Android 16)
          - 📤 Megosztás/Exportálás
          
          ### 📦 Build Info
          - Build #${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Platform: Android 16 (One UI 8.5)
          - Samsung A35 optimalizálva
          
        files: |
          debug-apk/*.apk
          release-apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
