# .github/workflows/android-build.yml
name: Build DeepSeek Pro APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🔑 Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "android.useAndroidX=true" >> local.properties
        echo "android.enableJetifier=true" >> local.properties

    - name: 🚀 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔨 Build Debug APK
      run: ./gradlew assembleDebug

    - name: 🔨 Build Release APK
      run: ./gradlew assembleRelease

    - name: 📦 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekPro-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: 📦 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekPro-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: 📊 Upload Build Reports
      uses: actions/upload-artifact@v4
      with:
        name: Build-Reports
        path: app/build/reports/
        retention-days: 7

    - name: 📝 Generate APK Info
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
        echo "|------|------|" >> $GITHUB_STEP_SUMMARY
        for apk in app/build/outputs/apk/debug/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done
        for apk in app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🔑 Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: 🚀 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🧪 Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: 📊 Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: Test-Reports
        path: app/build/reports/tests/
        retention-days: 7

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: DeepSeekPro-Debug-APK
        path: debug-apk/

    - name: 📥 Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: DeepSeekPro-Release-APK
        path: release-apk/

    - name: 🏷️ Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "DeepSeek Pro v1.0.${{ github.run_number }}"
        body: |
          ## 🚀 DeepSeek Pro APK Build
          
          ### 📱 Letöltések
          - **Debug APK** - Tesztelésre
          - **Release APK** - Éles használatra
          
          ### ✨ Funkciók
          - 🔍 Keresés a beszélgetésekben
          - 💾 Automatikus mentés
          - 📁 Jegyzettömb
          - 🧠 DeepThink (R1) támogatás
          - 📎 Fájlfeltöltés
          - 🌐 Magyar nyelv támogatás
          
          ### 📦 Build Info
          - Build #${{ github.run_number }}
          - Commit: ${{ github.sha }}
          
        files: |
          debug-apk/*.apk
          release-apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
