name: 🚀 DeepSeek Pro - Automatikus APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🧹 TELJES CACHE TÖRLÉS
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/wrapper/
        rm -rf .gradle/
        rm -rf app/build/
        echo "✅ Cache teljesen törölve!"

    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🚀 Setup Gradle (cache nélkül)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        cache-read-only: false
        cache-overwrite-existing: true
