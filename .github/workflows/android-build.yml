# .github/workflows/android-build.yml
name: 🚀 DeepSeek Pro - Automatikus APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🧹 Teljes cache törlés
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/wrapper/
        rm -rf .gradle/
        rm -rf app/build/
        echo "✅ Cache teljesen törölve!"

    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: 🚀 Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        cache-read-only: false
        cache-overwrite-existing: true

    - name: 📸 Ikonok generálása (ImageMagick)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        # 512x512 -> xxxhdpi
        convert -size 512x512 xc:#6C63FF -gravity center -pointsize 160 -fill white -annotate 0 "DS" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        convert -size 512x512 xc:#6C63FF -gravity center -pointsize 160 -fill white -annotate 0 "DS" -background none -flatten app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        # Átméretezés
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 192x192 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
        # Round
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png -resize 192x192 app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        convert app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher_round.png

    - name: 🔑 local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "android.useAndroidX=true" >> local.properties
        echo "android.enableJetifier=true" >> local.properties

    - name: 🔨 Debug APK build
      run: gradle assembleDebug --stacktrace --no-build-cache

    - name: 🔨 Release APK build
      run: gradle assembleRelease --stacktrace --no-build-cache

    - name: 📂 APK fájlok listázása
      run: |
        echo "=== ÖSSZES APK KERESÉSE ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "Nincs APK"
        echo ""
        echo "=== app/build/outputs/apk/ TARTALMA ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "Nincs apk mappa"
        echo ""
        echo "=== RÉSZLETES LISTA ==="
        find app/build -type f -name "*.apk" -exec ls -la {} \; 2>/dev/null || echo "Nincs APK"

    - name: 📦 Feltöltés - Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekPro-Debug-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/*/debug/*.apk
          app/build/outputs/apk/*.apk
        retention-days: 30

    - name: 📦 Feltöltés - Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: DeepSeekPro-Release-APK
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/*/release/*.apk
          app/build/outputs/apk/*.apk
        retention-days: 30

    - name: 📊 Build összegzés
      if: success()
      run: |
        echo "## 📱 Build Sikeres!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| APK | Méret |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
        for apk in app/build/outputs/apk/debug/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            echo "| Debug APK | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done
        for apk in app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            size=$(du -h "$apk" | cut -f1)
            echo "| Release APK | $size |" >> $GITHUB_STEP_SUMMARY
          fi
        done

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Debug APK letöltése
      uses: actions/download-artifact@v4
      with:
        name: DeepSeekPro-Debug-APK
        path: debug-apk/

    - name: 📥 Release APK letöltése
      uses: actions/download-artifact@v4
      with:
        name: DeepSeekPro-Release-APK
        path: release-apk/

    - name: 🏷️ GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "DeepSeek Pro v1.0.${{ github.run_number }}"
        body: |
          ## 🚀 DeepSeek Pro APK
          
          ### ✨ Funkciók
          - 💬 DeepSeek chat (WebView)
          - 🧠 DeepThink (R1) kapcsoló
          - 📁 Automatikus mentés
          - 🔍 Két szintű keresés
          - 📋 Jegyzettömb
          - ⚡ Gyors lapozás (csúszka)
          - 📎 Fájlfeltöltés
          - 🌐 Magyar nyelv
          - 🌙 Éjszakai mód (Android 16)
          - 📤 Megosztás/Exportálás
          
          ### 📦 Build Info
          - Build #${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Platform: Android 16 (One UI 8.5)
          - Samsung A35 optimalizálva
          
        files: |
          debug-apk/*.apk
          release-apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
