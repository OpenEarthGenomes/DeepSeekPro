release:
  runs-on: ubuntu-latest
  needs: build
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  
  steps:
  - name: 📥 APK-k letöltése
    uses: actions/download-artifact@v4
    with:
      path: apks/

  - name: 📂 APK fájlok ellenőrzése
    run: |
      echo "=== ÖSSZES LETÖLTÖTT FÁJL ==="
      find apks -type f -name "*.apk" -exec ls -la {} \;

  - name: 🏷️ GitHub Release (CLI)
    run: |
      # Release létrehozása
      gh release create v1.0.${{ github.run_number }} \
        --title "DeepSeek Pro v1.0.${{ github.run_number }}" \
        --notes "## 🚀 DeepSeek Pro APK

        ### ✨ Funkciók
        - 💬 DeepSeek chat (WebView)
        - 🧠 DeepThink (R1) kapcsoló
        - 📁 Automatikus mentés
        - 🔍 Két szintű keresés
        - 📋 Jegyzettömb
        - ⚡ Gyors lapozás (csúszka)
        - 📎 Fájlfeltöltés
        - 🌐 Magyar nyelv
        - 🌙 Éjszakai mód (Android 16)

        ### 📦 Build Info
        - Build #${{ github.run_number }}
        - Commit: ${{ github.sha }}" \
        $(find apks -name "*.apk" -type f | sed 's/^/-a /')
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
